<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiesta Reroll - Disponibilités</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent-2: #38bdf8;
      --border: #334155;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e293b);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 760px);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    p { color: var(--muted); line-height: 1.5; }

    form { display: grid; gap: 14px; margin-top: 20px; }
    label { display: flex; flex-direction: column; gap: 8px; font-weight: 600; }
    input, button {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 1rem;
      background: #0b1220;
      color: var(--text);
    }

    input:focus {
      outline: 2px solid rgba(56, 189, 248, 0.35);
      border-color: var(--accent-2);
    }

    button {
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), #fb923c);
      border: none;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #dbeafe;
      display: none;
    }

    .csv-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #0b1220;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 0.95rem;
      color: #e2e8f0;
      overflow-x: auto;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .checkbox-group {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .checkbox-item input {
      width: 18px;
      height: 18px;
      padding: 0;
      accent-color: var(--accent-2);
    }

    @media (max-width: 640px) {
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Choisis tes disponibilités</h1>
    <p>Remplis ton pseudo, ta localisation approximative et les dates pendant lesquelles tu es disponible.</p>

    <form id="availabilityForm">
      <label>
        Pseudo
        <input type="text" id="pseudo" placeholder="Ex. FiestaPlayer" required />
      </label>

      <label>
        Localisation approximative
        <input type="text" id="location" placeholder="Ex. Paris / Lyon / Nord" required />
      </label>

      <p class="hint">Les disponibilités proposées sont les week-ends de septembre et d’octobre, à l’exception du weekend du 11-13 septembre.</p>

      <label>
        Week-ends disponibles
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" value="6-8 septembre"> 6-8 septembre</label>
          <label class="checkbox-item"><input type="checkbox" value="20-22 septembre"> 20-22 septembre</label>
          <label class="checkbox-item"><input type="checkbox" value="27-29 septembre"> 27-29 septembre</label>
          <label class="checkbox-item"><input type="checkbox" value="4-6 octobre"> 4-6 octobre</label>
          <label class="checkbox-item"><input type="checkbox" value="11-13 octobre"> 11-13 octobre</label>
          <label class="checkbox-item"><input type="checkbox" value="18-20 octobre"> 18-20 octobre</label>
          <label class="checkbox-item"><input type="checkbox" value="25-27 octobre"> 25-27 octobre</label>
        </div>
      </label>

      <button type="submit">Enregistrer ma disponibilité</button>
    </form>

    <div id="message" class="message"></div>

    <section class="list">
      <div id="csvPreview" class="csv-box">Chargement…</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('availabilityForm');
    const message = document.getElementById('message');
    const csvPreview = document.getElementById('csvPreview');
    const storageKey = 'fiesta-reroll-entries';
    let entries = [];
    let fileHandle = null;

    function escapeCsv(value) {
      const stringValue = String(value ?? '');
      if (stringValue.includes(',') || stringValue.includes('"') || stringValue.includes('\n')) {
        return `"${stringValue.replace(/"/g, '""')}"`;
      }
      return stringValue;
    }

    function buildCsvText(items) {
      const lines = ['pseudo,localisation,weekends,createdAt'];
      items.forEach((item) => {
        const weekendText = item.weekends.join(' | ');
        lines.push([
          escapeCsv(item.pseudo),
          escapeCsv(item.location),
          escapeCsv(weekendText),
          escapeCsv(item.createdAt)
        ].join(','));
      });
      return lines.join('\n');
    }

    function renderPreview() {
      csvPreview.textContent = buildCsvText(entries);
    }

    function saveEntries() {
      localStorage.setItem(storageKey, JSON.stringify(entries));
    }

    function loadEntries() {
      try {
        const stored = localStorage.getItem(storageKey);
        if (stored) {
          entries = JSON.parse(stored);
        }
      } catch (error) {
        entries = [];
      }
    }

    async function saveCsvToFile() {
      const csvText = buildCsvText(entries);

      try {
        if (!fileHandle && 'showSaveFilePicker' in window) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: 'dispo.csv',
            types: [{ description: 'CSV Files', accept: { 'text/csv': ['.csv'] } }]
          });
        }

        if (!fileHandle) {
          const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'dispo.csv';
          link.click();
          URL.revokeObjectURL(url);
          return false;
        }

        const writable = await fileHandle.createWritable();
        await writable.write(csvText);
        await writable.close();
        return true;
      } catch (error) {
        if (error.name === 'AbortError') {
          throw new Error('La sélection du fichier a été annulée.');
        }
        throw error;
      }
    }

    async function initializePreview() {
      loadEntries();
      if (entries.length) {
        renderPreview();
        return;
      }

      try {
        const response = await fetch('dispo.csv');
        if (response.ok) {
          const text = await response.text();
          csvPreview.textContent = text.trim() || 'Aucune donnée enregistrée.';
        } else {
          renderPreview();
        }
      } catch (error) {
        renderPreview();
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const pseudo = document.getElementById('pseudo').value.trim();
      const location = document.getElementById('location').value.trim();
      const selectedWeekends = Array.from(document.querySelectorAll('.checkbox-group input[type="checkbox"]'))
        .filter((checkbox) => checkbox.checked)
        .map((checkbox) => checkbox.value);

      if (!selectedWeekends.length) {
        message.textContent = 'Veuillez choisir au moins un weekend disponible.';
        message.style.display = 'block';
        return;
      }

      const createdAt = new Date().toLocaleString('fr-FR');
      entries.push({ pseudo, location, weekends: selectedWeekends, createdAt });
      saveEntries();
      renderPreview();

      try {
        await saveCsvToFile();
        form.reset();
        message.textContent = `Merci ${pseudo} ! Ta disponibilité a bien été enregistrée dans dispo.csv.`;
        message.style.display = 'block';
      } catch (error) {
        message.textContent = 'La sauvegarde a échoué : ' + error.message;
        message.style.display = 'block';
      }
    });

    initializePreview();
  </script>
</body>
</html>
